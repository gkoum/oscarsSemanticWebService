<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1120" viewBox="0 0 1320 1120" role="img" aria-labelledby="title desc">
  <title id="title">Future semantic experiment finder agent flow</title>
  <desc id="desc">Future-state flow diagram showing an agent selecting any synchrotron, discovering semantic OpenAPI annotations, mapping user terms from external vocabularies such as PaNET to a facility vocabulary, confirming the mapped term, and searching a local facade, real facility API, or federated backends.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; rx: 20; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .action { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .decision { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .alt { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .success { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 12; }
      .federated { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; rx: 12; }
      .text { fill: #0f172a; font: 600 16px Arial, sans-serif; }
      .title { fill: #0f172a; font: 700 27px Arial, sans-serif; }
      .small { fill: #334155; font: 14px Arial, sans-serif; }
      .label { fill: #475569; font: 13px Arial, sans-serif; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1320" height="1120"/>
  <text x="42" y="46" class="title">Future Semantic Experiment Finder Agent Flow</text>
  <text x="42" y="76" class="small">The final agent continues with whichever synchrotron the user selects, discovers its semantic contract, maps vocabularies when needed, and searches the selected backend.</text>
  <rect class="panel" x="30" y="104" width="1260" height="982"/>

  <rect class="action" x="520" y="130" width="280" height="72"/>
  <text x="660" y="158" text-anchor="middle" class="text">Start semantic agent</text>
  <text x="660" y="181" text-anchor="middle" class="small">Experiment discovery workflow</text>

  <rect class="box" x="500" y="235" width="320" height="76"/>
  <text x="660" y="263" text-anchor="middle" class="text">Show facilities</text>
  <text x="660" y="286" text-anchor="middle" class="small">ESRF, Diamond, MAX IV, ...</text>

  <rect class="box" x="500" y="345" width="320" height="72"/>
  <text x="660" y="373" text-anchor="middle" class="text">User selects synchrotron</text>
  <text x="660" y="396" text-anchor="middle" class="small">Continue with selected facility</text>

  <rect class="action" x="490" y="450" width="340" height="84"/>
  <text x="660" y="480" text-anchor="middle" class="text">Fetch semantic profile</text>
  <text x="660" y="503" text-anchor="middle" class="small">OpenAPI or service description</text>

  <polygon class="decision" points="660,575 805,645 660,715 515,645"/>
  <text x="660" y="638" text-anchor="middle" class="text">Semantic</text>
  <text x="660" y="661" text-anchor="middle" class="small">annotations?</text>

  <rect class="alt" x="885" y="608" width="330" height="74"/>
  <text x="1050" y="635" text-anchor="middle" class="text">No annotations</text>
  <text x="1050" y="658" text-anchor="middle" class="small">Use adapter, cached profile, or manual mapping</text>

  <rect class="box" x="490" y="755" width="340" height="88"/>
  <text x="660" y="785" text-anchor="middle" class="text">Discover capabilities</text>
  <text x="660" y="808" text-anchor="middle" class="small">Ontologies, params, date semantics, instrument</text>

  <rect class="box" x="490" y="878" width="340" height="72"/>
  <text x="660" y="906" text-anchor="middle" class="text">Explain contract</text>
  <text x="660" y="929" text-anchor="middle" class="small">Example ESRF: techniquePids speaks ESRFET</text>

  <polygon class="decision" points="660,988 790,1050 660,1112 530,1050"/>
  <text x="660" y="1043" text-anchor="middle" class="text">User term</text>
  <text x="660" y="1066" text-anchor="middle" class="small">vocabulary?</text>

  <rect class="action" x="65" y="895" width="310" height="82"/>
  <text x="220" y="925" text-anchor="middle" class="text">Native vocabulary</text>
  <text x="220" y="948" text-anchor="middle" class="small">Normalize term, e.g. ESRFET:XAS</text>

  <rect class="action" x="925" y="870" width="330" height="96"/>
  <text x="1090" y="900" text-anchor="middle" class="text">External vocabulary</text>
  <text x="1090" y="923" text-anchor="middle" class="small">Map PaNET to facility vocabulary</text>
  <text x="1090" y="946" text-anchor="middle" class="small">Example PaNET01196 to ESRFET</text>

  <polygon class="decision" points="1090,700 1210,760 1090,820 970,760"/>
  <text x="1090" y="753" text-anchor="middle" class="text">Mapping</text>
  <text x="1090" y="776" text-anchor="middle" class="small">result?</text>

  <rect class="alt" x="935" y="520" width="310" height="66"/>
  <text x="1090" y="548" text-anchor="middle" class="text">No mapping</text>
  <text x="1090" y="571" text-anchor="middle" class="small">Ask another term or stop</text>

  <rect class="box" x="930" y="380" width="320" height="74"/>
  <text x="1090" y="407" text-anchor="middle" class="text">Multiple mappings</text>
  <text x="1090" y="430" text-anchor="middle" class="small">Explain exact, close, broader, narrower</text>

  <rect class="box" x="510" y="300" width="300" height="70"/>
  <text x="660" y="327" text-anchor="middle" class="text">Confirm mapped term</text>
  <text x="660" y="350" text-anchor="middle" class="small">Proceed with facility term?</text>

  <rect class="box" x="115" y="300" width="300" height="72"/>
  <text x="265" y="328" text-anchor="middle" class="text">Collect filters</text>
  <text x="265" y="351" text-anchor="middle" class="small">Dates, beamline, keywords</text>

  <rect class="action" x="115" y="430" width="300" height="78"/>
  <text x="265" y="459" text-anchor="middle" class="text">Build facility request</text>
  <text x="265" y="482" text-anchor="middle" class="small">Only supported params are sent</text>

  <polygon class="decision" points="265,550 395,615 265,680 135,615"/>
  <text x="265" y="607" text-anchor="middle" class="text">Search</text>
  <text x="265" y="630" text-anchor="middle" class="small">backend?</text>

  <rect class="success" x="35" y="735" width="215" height="76"/>
  <text x="142" y="764" text-anchor="middle" class="text">Local facade</text>
  <text x="142" y="787" text-anchor="middle" class="small">Semantic demo endpoint</text>

  <rect class="success" x="285" y="735" width="215" height="76"/>
  <text x="392" y="764" text-anchor="middle" class="text">Real facility API</text>
  <text x="392" y="787" text-anchor="middle" class="small">Example ICAT+ proxy</text>

  <rect class="federated" x="535" y="735" width="215" height="76"/>
  <text x="642" y="764" text-anchor="middle" class="text">Federated mode</text>
  <text x="642" y="787" text-anchor="middle" class="small">Compatible facilities</text>

  <polygon class="decision" points="392,850 520,910 392,970 264,910"/>
  <text x="392" y="903" text-anchor="middle" class="text">Search</text>
  <text x="392" y="926" text-anchor="middle" class="small">successful?</text>

  <rect class="alt" x="70" y="995" width="235" height="66"/>
  <text x="187" y="1023" text-anchor="middle" class="text">Upstream error</text>
  <text x="187" y="1046" text-anchor="middle" class="small">Report and keep context</text>

  <rect class="box" x="330" y="995" width="250" height="66"/>
  <text x="455" y="1023" text-anchor="middle" class="text">No results</text>
  <text x="455" y="1046" text-anchor="middle" class="small">Suggest broader search</text>

  <rect class="success" x="625" y="995" width="285" height="66"/>
  <text x="767" y="1023" text-anchor="middle" class="text">Return annotated experiments</text>
  <text x="767" y="1046" text-anchor="middle" class="small">Engine manipulates ontology-aware fields</text>

  <line class="line" x1="660" y1="202" x2="660" y2="235"/>
  <line class="line" x1="660" y1="311" x2="660" y2="345"/>
  <line class="line" x1="660" y1="417" x2="660" y2="450"/>
  <line class="line" x1="660" y1="534" x2="660" y2="575"/>
  <line class="line" x1="805" y1="645" x2="885" y2="645"/>
  <text x="830" y="633" class="label">No</text>
  <path class="line" d="M1050 682 C1050 735 830 735 830 799"/>
  <line class="line" x1="660" y1="715" x2="660" y2="755"/>
  <text x="673" y="738" class="label">Yes</text>
  <line class="line" x1="660" y1="843" x2="660" y2="878"/>
  <line class="line" x1="660" y1="950" x2="660" y2="988"/>
  <path class="line" d="M530 1050 C395 1050 220 1035 220 977"/>
  <text x="385" y="1037" class="label">Native</text>
  <path class="line" d="M790 1050 C990 1050 1090 1015 1090 966"/>
  <text x="835" y="1037" class="label">External</text>
  <line class="line" x1="1090" y1="870" x2="1090" y2="820"/>
  <path class="line" d="M1090 700 V586"/>
  <text x="1105" y="642" class="label">None</text>
  <path class="line" d="M1210 760 C1260 760 1265 418 1250 418"/>
  <text x="1235" y="585" class="label">Multiple</text>
  <path class="line" d="M930 417 C835 417 805 358 810 335"/>
  <path class="line" d="M970 760 C820 760 660 520 660 370"/>
  <text x="806" y="570" class="label">Single</text>
  <path class="line" d="M510 335 H415"/>
  <path class="dash" d="M660 300 C600 250 490 250 420 300"/>
  <text x="520" y="253" class="label">No: revise</text>
  <path class="line" d="M220 895 C220 680 265 470 265 372"/>
  <line class="line" x1="265" y1="372" x2="265" y2="430"/>
  <line class="line" x1="265" y1="508" x2="265" y2="550"/>
  <path class="line" d="M180 670 C140 700 142 715 142 735"/>
  <path class="line" d="M265 680 C350 700 392 715 392 735"/>
  <path class="line" d="M350 650 C520 690 642 710 642 735"/>
  <path class="line" d="M142 811 C142 860 264 875 304 894"/>
  <path class="line" d="M392 811 V850"/>
  <path class="line" d="M642 811 C642 860 520 875 480 894"/>
  <path class="line" d="M300 950 C250 965 200 980 187 995"/>
  <path class="line" d="M392 970 C410 980 440 990 455 995"/>
  <path class="line" d="M500 930 C580 965 690 980 767 995"/>
</svg>
